services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:23-bullseye-slim}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-}
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: ${PORT:-8787}
      DATA_DIR: /app/data
      SQLITE_JOURNAL_MODE: ${SQLITE_JOURNAL_MODE:-DELETE}
      SQLITE_LOCKING_MODE: ${SQLITE_LOCKING_MODE:-EXCLUSIVE}
    ports:
      - "${PORT:-8787}:${PORT:-8787}"
    volumes:
      - ./data:/app/data
